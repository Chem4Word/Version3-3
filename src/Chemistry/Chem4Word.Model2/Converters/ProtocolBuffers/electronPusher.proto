syntax ="proto3";
package model;

option csharp_namespace = "Chem4Word.Model2.Converters.ProtocolBuffers";

import "google/protobuf/wrappers.proto";

message PBElectronPusher
{
	string Id = 1;
	string FirstControlPoint = 2;
	string SecondControlPoint = 3;
	string FirstChemistryRef = 4;
	string ScondChemistryRefs = 5;
	google.protobuf.Int32Value PusherType = 6;
}